<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#5f5a80"/>
  <!-- Soft inner glow -->
  <circle cx="96" cy="96" r="72" fill="#7b75a0" opacity="0.4"/>
  <!-- Leaf / spa symbol -->
  <g transform="translate(96,96)">
    <!-- Main leaf -->
    <path d="M0,-48 C28,-28 38,0 20,30 C10,46 -10,46 -20,30 C-38,0 -28,-28 0,-48 Z" fill="#d2e5cb" opacity="0.95"/>
    <!-- Inner vein -->
    <line x1="0" y1="-42" x2="0" y2="34" stroke="#52634e" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Side veins -->
    <line x1="0" y1="-10" x2="18" y2="8" stroke="#52634e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="-10" x2="-18" y2="8" stroke="#52634e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="8" x2="14" y2="22" stroke="#52634e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="8" x2="-14" y2="22" stroke="#52634e" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Small heart -->
    <path d="M0,42 C0,42 -10,34 -10,28 C-10,23 -5,20 0,25 C5,20 10,23 10,28 C10,34 0,42 0,42 Z" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
