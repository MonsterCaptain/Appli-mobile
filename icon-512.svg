    <!-- Side veins -->
    <line x1="0" y1="-26" x2="48" y2="20" stroke="#52634e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="-26" x2="-48" y2="20" stroke="#52634e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="22" x2="38" y2="58" stroke="#52634e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="22" x2="-38" y2="58" stroke="#52634e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Small heart -->
    <path d="M0,112 C0,112 -26,90 -26,74 C-26,62 -14,54 0,66 C14,54 26,62 26,74 C26,90 0,112 0,112 Z" fill="#ffffff" opacity="0.9"/>
